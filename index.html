<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy For Rasya</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: black;
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        /* =========================
        INPUT SCREEN
        ========================= */
        #inputScreen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50; /* Di atas segalanya saat awal */
            background: radial-gradient(circle, #1a0033, #000);
            transition: opacity 0.5s ease;
        }

        #inputScreen h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        input {
            padding: 15px 25px;
            border: none;
            outline: none;
            border-radius: 50px;
            width: 280px;
            font-size: 1rem;
            margin-bottom: 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        button {
            padding: 14px 35px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            background: linear-gradient(135deg, #ff4d6d, #7b2ff7);
            color: white;
            transition: .3s;
            box-shadow: 0 4px 15px rgba(123, 47, 247, 0.4);
        }

        button:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 25px rgba(255, 77, 109, 0.6);
        }

        /* =========================
        GALAXY SCENE
        ========================= */
        #scene {
            position: absolute;
            inset: 0;
            perspective: 1000px; /* Diperkecil agar efek kedalaman Z-axis lebih berasa */
            overflow: hidden;
            display: none;
        }

        #space {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out; /* Menghaluskan pergerakan mouse */
        }

        /* =========================
        STARS & PHOTOS (3D)
        ========================= */
        .star {
            position: absolute;
            border-radius: 50%;
            opacity: 0.8;
        }

        .photo {
            position: absolute;
            width: 120px; /* Sedikit diperbesar agar lebih jelas */
            height: 120px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            /* Animasi float dipecah agar tidak tabrakan dengan translate3d dari JS */
            animation: float 4s infinite ease-in-out alternate; 
            pointer-events: none;
        }

        @keyframes float {
            from { margin-top: 0px; }
            to { margin-top: -20px; }
        }

        /* =========================
        INTERFACE (2D OVERLAY)
        ========================= */
        #message {
            position: absolute;
            top: 12%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            text-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 10px rgba(123, 47, 247, 0.8);
            z-index: 10; /* Berada di depan objek 3D */
            width: 90%;
        }

        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 400px;
            height: 400px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(180, 0, 255, 0.4), rgba(0, 0, 0, 0));
            filter: blur(60px);
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="inputScreen">
        <h1>Masukkan Namamu ✨</h1>
        <input type="text" id="nameInput" placeholder="Nama kamu...">
        <button onclick="startGalaxy()">Masuk Ke Semesta ❤️</button>
    </div>

    <div id="scene">
        <div id="message"></div>
        <div class="glow"></div>
        <div id="space"></div> </div>

    <audio id="music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script>
        /* =========================
        PHOTO LIST
        ========================= */
        const photos = [
            "rasya1.jpeg",
            "rasya2.jpeg",
            "rasya3.jpeg",
            "rasya4.jpeg",
            "rasya5.jpeg",
            "rasya6.jpeg"
        ];

        /* =========================
        START SYSTEM
        ========================= */
        function startGalaxy(){
            const name = document.getElementById("nameInput").value;

            if(name.trim() === ""){
                alert("Masukkan nama dulu ✨");
                return;
            }

            document.getElementById("inputScreen").style.display = "none";
            document.getElementById("scene").style.display = "block";
            document.getElementById("message").innerHTML = `Only for you, ${name} ❤️`;

            const music = document.getElementById("music");
            music.volume = 0.7;
            music.play().catch(error => console.log("Autoplay diblokir browser, klik bebas di layar untuk memutar musik."));

            generateStars();
            generatePhotos();
        }

        /* =========================
        GENERATORS (3D SPACE)
        ========================= */
        function generateStars(){
            const space = document.getElementById("space");
            
            for(let i = 0; i < 500; i++){ /* Berkurang dari 1200 menjadi 500 agar performa HP/Laptop lancar */
                const star = document.createElement("div");
                star.className = "star";
                
                const size = Math.random() * 3 + 1;
                star.style.width = size + "px";
                star.style.height = size + "px";
                
                // Distribusi bintang dalam ruang 3D nyata
                const x = (Math.random() - 0.5) * 3000;
                const y = (Math.random() - 0.5) * 2000;
                const z = (Math.random() - 0.5) * 2000; // Menggunakan koordinat Z negatif dan positif
                
                star.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
                star.style.background = Math.random() > 0.5 ? "#ff4dff" : "#9d7bff";
                
                space.appendChild(star);
            }
        }

        function generatePhotos(){
            const space = document.getElementById("space");
            const totalPhotos = 40; // Dikurangi dari 120 agar tidak terlalu padat dan menumpuk

            for(let i = 0; i < totalPhotos; i++){
                const img = document.createElement("img");
                img.src = photos[i % photos.length]; // Distribusi merata dari array foto kamu
                img.className = "photo";
                
                // Sebaran koordinat yang disesuaikan agar tidak menumpuk di satu titik tengah saja
                const x = (Math.random() - 0.5) * 2000;
                const y = (Math.random() - 0.5) * 1200;
                const z = (Math.random() * 1200) - 600; // Sebaran kedalaman dari jauh (-600px) ke dekat (600px)
                
                img.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
                
                space.appendChild(img);
            }
        }

        /* =========================
        INTERACTIVE PARALLAX
        ========================= */
        document.addEventListener("mousemove", e => {
            const x = (e.clientX / window.innerWidth - 0.5) * 30; // Sensivitas rotasi horizontal
            const y = (e.clientY / window.innerHeight - 0.5) * 30; // Sensivitas rotasi vertikal
            
            // Ditambahkan transisi mulus pada transform style inline-nya
            document.getElementById("space").style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });
    </script>
</body>
</html>
